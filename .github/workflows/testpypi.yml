name: Publish TestPyPI

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release tag to validate against pyproject version (e.g. v0.1.0)"
        required: true
        type: string
  release:
    types: [prereleased]

jobs:
  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/mneme
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve expected tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag matches python package version
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          expected = tag[1:] if tag.startswith("v") else tag
          pyproject = Path("python/pyproject.toml")
          data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
          actual = str(data["project"]["version"])
          if actual != expected:
              raise SystemExit(
                  f"Release tag '{tag}' does not match python/pyproject.toml version '{actual}'"
              )
          print(f"Version check passed: tag={tag} version={actual}")
          PY

      - name: Build distribution
        working-directory: python
        run: |
          python -m pip install build
          python -m build

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: python/dist
