name: Release Check

on:
  push:
    tags:
      - "v*"

jobs:
  validate-release-tag:
    name: Validate release tag and package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Verify tag matches python package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          expected = tag[1:] if tag.startswith("v") else tag
          pyproject = Path("python/pyproject.toml")
          data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
          actual = str(data["project"]["version"])
          if actual != expected:
              raise SystemExit(
                  f"Tag '{tag}' does not match python/pyproject.toml version '{actual}'"
              )
          print(f"Version check passed: tag={tag} version={actual}")
          PY

      - name: Build package and validate metadata
        working-directory: python
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
