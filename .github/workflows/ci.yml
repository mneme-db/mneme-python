name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12", "3.14"]

    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      MNEME_RELEASE_TAG: v0.5.0
      MNEME_AUTO_DOWNLOAD: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install package and dev dependencies
        run: python -m pip install -e './python[dev]'

      - name: Ruff lint
        run: python -m ruff check python/src python/tests

      - name: Ruff format check
        run: python -m ruff format --check python/src python/tests

      - name: Bandit
        run: python -m bandit -c python/pyproject.toml -r python/src

      - name: MyPy
        run: python -m mypy --config-file python/pyproject.toml python/src/mneme

      - name: Pytest + coverage gate
        run: python -m pytest python/tests

  package:
    name: Package build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Build and check sdist/wheel
        working-directory: python
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
