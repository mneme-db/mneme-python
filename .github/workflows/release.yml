name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
on:
  release:
    types: [published]

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.name }})
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runs_on: ubuntu-latest
            platform_id: linux-x86_64
          - name: macos-arm64
            runs_on: macos-latest
            platform_id: macos-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify python README is in sync
        run: python scripts/sync_python_readme.py --check

      - name: Verify tag matches python package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          expected = tag[1:] if tag.startswith("v") else tag
          pyproject = Path("python/pyproject.toml")
          data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
          actual = str(data["project"]["version"])
          if actual != expected:
              raise SystemExit(
                  f"Release tag '{tag}' does not match python/pyproject.toml version '{actual}'"
              )
          print(f"Version check passed: tag={tag} version={actual}")
          PY

      - name: Bundle native library for wheel
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/prepare_bundled_native.py \
            --tag "${{ github.event.release.tag_name }}" \
            --platform-id "${{ matrix.platform_id }}" \
            --token "${GITHUB_TOKEN}"

      - name: Build platform wheel
        working-directory: python
        run: |
          python -m pip install build
          python -m build --wheel

      - name: Verify bundled native lib exists in wheel
        env:
          PLATFORM_ID: ${{ matrix.platform_id }}
        run: |
          python - <<'PY'
          import glob
          import os
          import zipfile

          wheels = glob.glob("python/dist/*.whl")
          assert wheels, "no wheel produced"
          wheel = wheels[0]
          platform_id = os.environ["PLATFORM_ID"]
          expected = "libmneme.dylib" if platform_id.startswith("macos-") else "libmneme.so"
          with zipfile.ZipFile(wheel) as zf:
              names = zf.namelist()
          assert any(name.endswith(f"mneme/_native/{expected}") for name in names), (
              f"bundled native lib {expected} not found in wheel {wheel}"
          )
          print(f"verified {expected} bundled in {wheel}")
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform_id }}
          path: python/dist/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify python README is in sync
        run: python scripts/sync_python_readme.py --check

      - name: Build sdist
        working-directory: python
        run: |
          python -m pip install build
          python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist/*.tar.gz

  upload-release-assets:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Publish artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/*